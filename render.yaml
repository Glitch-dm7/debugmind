services:
  - type: web
    name: debugmind-backend
    runtime: node
    repo: https://github.com/Glitch-dm7/debugmind
    rootDir: backend
    region: oregon
    plan: free
    branch: main
    buildCommand: npm install -g bun && bun install
    startCommand: bun run src/index.ts
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: COGNEE_BASE_URL
        sync: false
      - key: COGNEE_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false